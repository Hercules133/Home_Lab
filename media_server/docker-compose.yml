services:
  sonarr:
    image: linuxserver/sonarr
    container_name: sonarr
    environment:
      - PUID=1000           
      - PGID=1000           
      - TZ=Europe/Berlin    
    volumes:
      - ${VD_PATH}/config/sonarr:/config
      - ${VD_PATH}/tv:/tv
      - ${VD_PATH}/downloads:/downloads
    ports:
      - 127.0.0.1:8989:8989
    restart: unless-stopped
    networks:
      - media_net

  radarr:
    image: linuxserver/radarr
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
    volumes:
      - ${VD_PATH}/config/radarr:/config
      - ${VD_PATH}/movies:/movies
      - ${VD_PATH}/downloads:/downloads
    ports:
      - 127.0.0.1:7878:7878
    restart: unless-stopped
    networks:
      - media_net

  prowlarr:
    image: linuxserver/prowlarr
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
    volumes:
      - ${VD_PATH}/config/prowlarr:/config
    ports:
      - 127.0.0.1:9696:9696
    restart: unless-stopped
    networks:
      - media_net

  qbittorrent:
    image: linuxserver/qbittorrent
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
      - WEBUI_PORT=8080
    volumes:
      - ${VD_PATH}/config:/config
      - ${VD_PATH}/downloads:/downloads
    ports:
      - 127.0.0.1:8080:8080  
    restart: unless-stopped
    networks:
      - media_net

  readarr:
      image: linuxserver/readarr:develop
      container_name: readarr
      environment:
        - PUID=1000           
        - PGID=1000           
        - TZ=Europe/Berlin    
      volumes:
        - ${VD_PATH}/config/readarr:/config
        - ${VD_PATH}/books:/books
        - ${VD_PATH}/downloads:/downloads
      ports:
        - 127.0.0.1:8787:8787
      restart: unless-stopped
      networks:
        - media_net

  lidarr:
      image: linuxserver/lidarr
      container_name: lidarr
      environment:
        - PUID=1000           
        - PGID=1000           
        - TZ=Europe/Berlin    
      volumes:
        - ${VD_PATH}/config/lidarr:/config
        - ${VD_PATH}/music:/music
        - ${VD_PATH}/downloads:/downloads
      ports:
        - 127.0.0.1:8686:8686
      restart: unless-stopped
      networks:
        - media_net
networks:
  media_net:
    driver: bridge
