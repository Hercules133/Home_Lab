services:
  zabbix-mysql:
    image: mysql:8.0-oracle
    container_name: zabbix-mysql
    command:
      - --character-set-server=utf8
      - --collation-server=utf8_bin
      - --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_DATABASE=${ZABBIX_MYSQL_DATABASE:-zabbix}
      - MYSQL_USER=${ZABBIX_MYSQL_USER:-zabbix}
      - MYSQL_PASSWORD=${ZABBIX_MYSQL_PASSWORD:-zabbix_pwd}
      - MYSQL_ROOT_PASSWORD=${ZABBIX_MYSQL_ROOT_PASSWORD:-root_pwd}
    volumes:
      - ./data/mysql:/var/lib/mysql
    restart: unless-stopped

  zabbix-server:
    image: zabbix/zabbix-server-mysql:alpine-7.4-latest
    container_name: zabbix-server
    depends_on:
      - zabbix-mysql
    environment:
      - DB_SERVER_HOST=zabbix-mysql
      - MYSQL_DATABASE=${ZABBIX_MYSQL_DATABASE:-zabbix}
      - MYSQL_USER=${ZABBIX_MYSQL_USER:-zabbix}
      - MYSQL_PASSWORD=${ZABBIX_MYSQL_PASSWORD:-zabbix_pwd}
      - MYSQL_ROOT_PASSWORD=${ZABBIX_MYSQL_ROOT_PASSWORD:-root_pwd}
    ports:
      - 10051:10051
    restart: unless-stopped

  zabbix-web:
    image: zabbix/zabbix-web-nginx-mysql:alpine-7.4-latest
    container_name: zabbix-web
    depends_on:
      - zabbix-server
      - zabbix-mysql
    environment:
      - ZBX_SERVER_HOST=zabbix-server
      - DB_SERVER_HOST=zabbix-mysql
      - MYSQL_DATABASE=${ZABBIX_MYSQL_DATABASE:-zabbix}
      - MYSQL_USER=${ZABBIX_MYSQL_USER:-zabbix}
      - MYSQL_PASSWORD=${ZABBIX_MYSQL_PASSWORD:-zabbix_pwd}
      - MYSQL_ROOT_PASSWORD=${ZABBIX_MYSQL_ROOT_PASSWORD:-root_pwd}
      - PHP_TZ=Europe/Berlin
    ports:
      - 127.0.0.1:8085:8080
    restart: unless-stopped
